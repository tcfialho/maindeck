<!DOCTYPE html><meta charset=utf-8><title>kbtest</title>
<body style="font:20px monospace;padding:2rem;background:#111;color:#eee">
Pressione Ctrl+Tab aqui
<script>
addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Tab') {
    e.preventDefault();
    document.body.textContent = 'GOT IT ' + Date.now();
  }
}, { capture: true });
</script>
